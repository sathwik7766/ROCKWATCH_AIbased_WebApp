{% extends "base.html" %}
{% block title %}Log In · Rockfall Watch{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card card">
        <h2 class="card-title">Log In</h2>
        <p class="card-subtitle mb-0" style="text-align:center; margin-bottom:24px;">Access your monitoring stations</p>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Log In</button>
        </form>
        <p class="auth-footer">No account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
</div>
{% endblock %}
