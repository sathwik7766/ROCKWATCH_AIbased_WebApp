{% extends "base.html" %}
{% block title %}Register · Rockfall Watch{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card card">
        <h2 class="card-title">Create Account</h2>
        <p class="card-subtitle mb-0" style="text-align:center; margin-bottom:24px;">Set up a new monitoring account</p>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </div>
</div>
{% endblock %}
